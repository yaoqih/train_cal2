name: Release Windows API Server

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  windows-x64:
    name: Build Windows x64 server
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python 3.12 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: |
            requirements-api.txt
            requirements-windows-build.txt

      - name: Install locked build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements-windows-build.txt
          python -m pip check

      - name: Run API regression tests on Windows
        shell: pwsh
        run: |
          python -m compileall -q plan_api packaging/windows_server_entry.py
          python -m pytest -q tests/test_plan_api.py

      - name: Build compact portable ZIP
        id: package
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          ./packaging/build_windows_release.ps1 -Version $env:RELEASE_VERSION

      - name: Smoke test packaged server and frozen worker
        shell: pwsh
        env:
          BUNDLE_PATH: ${{ steps.package.outputs.bundle_path }}
        run: |
          ./packaging/smoke_windows_release.ps1 -BundlePath $env:BUNDLE_PATH

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
        run: |
          gh release upload $env:RELEASE_TAG `
            $env:ASSET_PATH `
            $env:CHECKSUM_PATH `
            --clobber `
            --repo $env:GITHUB_REPOSITORY
